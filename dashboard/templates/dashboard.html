<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f5f7fb;
}

/* 🔵 TOP BANNER */
.banner {
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    padding: 20px 30px;
    font-size: 24px;
    font-weight: bold;
}

/* 📦 Layout */
.container {
    display: flex;
}

/* 📌 Sidebar */
.sidebar {
    width: 220px;
    background: white;
    height: 100vh;
    padding: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}

.sidebar h2 {
    margin-bottom: 20px;
}

.sidebar a {
    display: block;
    margin: 10px 0;
    text-decoration: none;
    color: #333;
    padding: 10px;
    border-radius: 8px;
    transition: 0.3s;
}

.sidebar a:hover {
    background: #e0e7ff;
}

/* 🔴 Logout bottom */
.logout-section {
    margin-top: auto;
}

.logout-section a {
    color: red;
    font-weight: bold;
}

/* 📊 Main */
.main {
    flex: 1;
    padding: 30px;
}

/* 📦 Cards */
.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
}

.card {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
}

.title {
    font-weight: bold;
}

.desc {
    color: #666;
}

/* 📊 Graph Box */
.chart-box {
    background: white;
    padding: 20px;
    border-radius: 12px;
}
</style>

</head>
<body>

<!-- 🔵 TOP -->
<div class="banner">
    Dashboard
</div>

<div class="container">

    <!-- 📌 SIDEBAR -->
    <div class="sidebar">
        <h2>Vinish</h2>

        <a href="/attendance/">📅 Attendance</a>
        <a href="/tasks/">📝 Tasks</a>
        <a href="/profile/">👤 Profile</a>
        <a href="/schedule/">🗓 Daily Schedule</a>
        <a href="/report/">📊 Monthly Report</a>

        <!-- 🔴 Logout bottom -->
        <div class="logout-section">
            <a href="#" onclick="confirmLogout()">🚪 Logout</a>
        </div>
    </div>

    <!-- 📊 MAIN -->
    <div class="main">

        <div class="cards">
            <div class="card">
                <div class="title">Attendance</div>
                <div class="desc">View your 30 days attendance</div>
            </div>

            <div class="card">
                <div class="title">Tasks</div>
                <div class="desc">Check your daily tasks</div>
            </div>

            <div class="card">
                <div class="title">Profile</div>
                <div class="desc">View your personal details</div>
            </div>
        </div>

        <!-- 📊 Graph -->
        <div class="chart-box">
            <h3>Attendance Overview</h3>

            <canvas id="attendanceChart"></canvas>
        </div>

    </div>

</div>

<!-- 📊 Chart JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('attendanceChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: {{ dates|safe }},
        datasets: [{
            label: 'Attendance',
            data: {{ status_list|safe }},
            backgroundColor: status_list.map(s => s == 1 ? 'green' : 'red')
        }]
    }
});
</script>

<!-- 🔴 Logout Confirm -->
<script>
function confirmLogout() {
    let confirmAction = confirm("Are you sure you want to logout?");
    if (confirmAction) {
        window.location.href = "/logout/";
    }
}
</script>

</body>
