<!DOCTYPE html>
<html>
<head>
<title>Profile</title>

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    background: #f5f7fa;
}

/* 🔵 TOP BANNER */
.banner {
    background: linear-gradient(135deg, #0a1f44, #123a7a);
    color: white;
    padding: 30px;
    font-size: 26px;
    font-weight: bold;
}

/* 📦 CONTAINER */
.container {
    padding: 40px;
    display: flex;
    justify-content: center;
}

/* 👤 PROFILE CARD */
.card {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

/* EACH FIELD */
.field {
    margin-bottom: 15px;
}

.label {
    font-weight: bold;
    color: #0a1f44;
}

.value {
    margin-top: 5px;
    color: #444;
}
</style>

</head>

<body>

<!-- 🔵 Banner -->
<div class="banner">
    👤 Profile
</div>

<!-- ⚪ Profile Content -->
<div class="container">

<div class="card">

    <div class="field">
        <div class="label">Name</div>
        <div class="value">{{ request.user.username }}</div>
    </div>

    <div class="field">
        <div class="label">Email</div>
        <div class="value">{{ request.user.email }}</div>
    </div>

    {% if data %}
    <div class="field">
        <div class="label">Phone</div>
        <div class="value">{{ data.phone }}</div>
    </div>

    <div class="field">
        <div class="label">Address</div>
        <div class="value">{{ data.address }}</div>
    </div>
    {% else %}
        <p>No profile data available</p>
    {% endif %}

</div>

</div>

</body>
</html>
